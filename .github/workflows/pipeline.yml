name: CI-CD

on:
  push:
    branches: [ main ]

jobs:

  build-and-push:
    runs-on: self-hosted
    permissions:
      contents: read
    outputs:
      image-backend: 192.168.136.12:5000/devops-cicd-demo/backend:latest
      image-frontend: 192.168.136.12:5000/devops-cicd-demo/frontend:latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set lowercase repo name
        run: echo "REPO=devops-cicd-demo" >> $GITHUB_ENV

      - name: Build backend image
        run: |
          docker build -t 192.168.136.12:5000/$REPO/backend:latest ./backend

      - name: Build frontend image
        run: |
          docker build -t 192.168.136.12:5000/$REPO/frontend:latest ./frontend

      - name: Push backend image
        run: docker push 192.168.136.12:5000/$REPO/backend:latest

      - name: Push frontend image
        run: docker push 192.168.136.12:5000/$REPO/frontend:latest

      - name: Cleanup old images in registry
        run: |
          cd /opt
          bash ./scripts/cleanup_registry.sh
          docker exec local-registry registry garbage-collect /etc/docker/registry/config.yml

  deploy-prod:
    runs-on: self-hosted
    needs: build-and-push
    environment:
      name: prod
      url: http://192.168.136.11
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Deploy to prod server
        uses: appleboy/ssh-action@v0.1.7
        with:
          host: 192.168.136.11
          username: iadmin
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /opt/devops-demo/devops-cicd-demo

            # Pull последних образов из локального registry
            docker pull 192.168.136.12:5000/devops-cicd-demo/backend:latest
            docker pull 192.168.136.12:5000/devops-cicd-demo/frontend:latest

            # Запуск prod контейнеров
            docker compose -f deploy/docker-compose.prod.yml up -d